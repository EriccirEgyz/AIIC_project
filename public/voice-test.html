<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>语音测试 · Web Speech API</title>
  <style>
    * { box-sizing: border-box }
    body {
      font: 14px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 720px; margin: 0 auto; padding: 32px 20px;
      background: #fafafa; color: #18181b;
    }
    h1 { font-size: 22px; margin: 0 0 4px }
    .sub { color: #71717a; margin: 0 0 24px }
    .card {
      background: white; border: 1px solid #e4e4e7; border-radius: 12px;
      padding: 20px; margin-bottom: 20px;
    }
    .card h2 { font-size: 16px; margin: 0 0 12px }
    button {
      background: #18181b; color: white; border: 0; border-radius: 8px;
      padding: 10px 16px; font-size: 14px; font-weight: 500; cursor: pointer;
      margin-right: 8px; margin-bottom: 8px;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed }
    button.ghost { background: white; color: #18181b; border: 1px solid #d4d4d8 }
    button.danger { background: #dc2626 }
    .status {
      font-size: 12px; color: #71717a; padding: 6px 10px;
      background: #f4f4f5; border-radius: 6px; display: inline-block;
    }
    .status.live { background: #fee2e2; color: #b91c1c }
    .out {
      min-height: 80px; border: 1px solid #e4e4e7; border-radius: 8px;
      padding: 12px; background: #fafafa; font-family: ui-monospace, monospace;
      white-space: pre-wrap; word-break: break-word; line-height: 1.7;
    }
    .out .interim { color: #a1a1aa; font-style: italic }
    .out .final { color: #18181b }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap }
    select, input[type=text] {
      border: 1px solid #d4d4d8; border-radius: 6px; padding: 6px 8px;
      font: inherit; background: white;
    }
    .err {
      color: #b91c1c; background: #fef2f2; border: 1px solid #fecaca;
      padding: 8px 12px; border-radius: 6px; font-size: 13px;
    }
    .ok { color: #15803d }
    label { font-size: 13px; color: #52525b }
  </style>
</head>
<body>
  <h1>🎤 Web Speech API 实验</h1>
  <p class="sub">浏览器原生 STT + TTS, 跟最终产品里要用的同一套 API。建议用 <strong>Chrome / Edge</strong>。</p>

  <div class="card">
    <h2>① 语音识别 (STT)</h2>
    <div class="row" style="margin-bottom: 12px">
      <label>语言:</label>
      <select id="lang">
        <option value="zh-CN" selected>中文(普通话)</option>
        <option value="en-US">English (US)</option>
      </select>
      <button id="start">开始录音</button>
      <button id="stop" class="danger" disabled>停止</button>
      <span id="recStatus" class="status">空闲</span>
    </div>
    <div class="out" id="transcript">尝试说一段话, 比如:
"我大三时做了一个图像超分辨率项目, 在 Set5 数据集上 PSNR 提升了 0.3 dB"</div>
    <p class="sub" style="margin-top: 8px; font-size: 12px">
      ⚠ Chrome / Edge 实际是把音频发到 Google 服务器识别(国内可能慢但通常能用)。Safari 用 Apple 服务。Firefox 不支持。
    </p>
  </div>

  <div class="card">
    <h2>② 语音合成 (TTS) — 让 AI 朗读追问</h2>
    <div class="row" style="margin-bottom: 12px">
      <label>音色:</label>
      <select id="voice" style="min-width: 200px"></select>
      <label>语速:</label>
      <input type="range" id="rate" min="0.5" max="1.5" step="0.1" value="1.0" />
      <span id="rateVal">1.0x</span>
    </div>
    <div class="row" style="margin-bottom: 12px">
      <input type="text" id="ttsText" value="你刚才提到 PSNR 提升 0.3 dB, 这是单次跑的结果还是多个 seed 平均?" style="flex: 1; min-width: 280px" />
      <button id="speak">朗读</button>
      <button id="stopTts" class="ghost">停止</button>
    </div>
    <p class="sub" style="font-size: 12px" id="voiceCount">音色加载中…</p>
  </div>

  <div class="card">
    <h2>③ 浏览器支持检测</h2>
    <div id="support" class="out" style="min-height: 0"></div>
  </div>

  <script>
    // ---- 支持检测 ----
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const support = document.getElementById('support');
    support.innerHTML = [
      `SpeechRecognition (STT): ${SR ? '<span class="ok">✓ 支持</span>' : '<span style="color:#b91c1c">✗ 不支持(请用 Chrome/Edge)</span>'}`,
      `SpeechSynthesis (TTS): ${window.speechSynthesis ? '<span class="ok">✓ 支持</span>' : '<span style="color:#b91c1c">✗ 不支持</span>'}`,
      `用户代理: ${navigator.userAgent.split(') ').pop()}`
    ].join('\n');

    // ---- STT ----
    let recognition = null;
    let finalText = '';
    const transcriptEl = document.getElementById('transcript');
    const startBtn = document.getElementById('start');
    const stopBtn = document.getElementById('stop');
    const recStatus = document.getElementById('recStatus');

    function setupRecognition() {
      if (!SR) return null;
      const r = new SR();
      r.continuous = true;
      r.interimResults = true;
      r.lang = document.getElementById('lang').value;
      r.onresult = (e) => {
        let interim = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
          const t = e.results[i][0].transcript;
          if (e.results[i].isFinal) finalText += t;
          else interim += t;
        }
        transcriptEl.innerHTML =
          `<span class="final">${escape(finalText)}</span><span class="interim">${escape(interim)}</span>`;
      };
      r.onstart = () => { recStatus.textContent = '🔴 录音中…'; recStatus.classList.add('live'); };
      r.onend = () => { recStatus.textContent = '已停止'; recStatus.classList.remove('live'); startBtn.disabled = false; stopBtn.disabled = true; };
      r.onerror = (e) => { recStatus.textContent = '错误: ' + e.error; recStatus.classList.remove('live'); };
      return r;
    }

    startBtn.onclick = () => {
      finalText = '';
      transcriptEl.innerHTML = '';
      recognition = setupRecognition();
      if (!recognition) { alert('浏览器不支持 SpeechRecognition'); return; }
      try {
        recognition.start();
        startBtn.disabled = true;
        stopBtn.disabled = false;
      } catch (e) { alert('启动失败: ' + e.message); }
    };
    stopBtn.onclick = () => recognition && recognition.stop();

    function escape(s) { return s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

    // ---- TTS ----
    const voiceSelect = document.getElementById('voice');
    const voiceCount = document.getElementById('voiceCount');
    function loadVoices() {
      const voices = speechSynthesis.getVoices();
      const zh = voices.filter(v => v.lang.startsWith('zh'));
      const en = voices.filter(v => v.lang.startsWith('en'));
      voiceSelect.innerHTML = '';
      [...zh, ...en].forEach(v => {
        const opt = document.createElement('option');
        opt.value = v.name;
        opt.textContent = `${v.name} (${v.lang})${v.default ? ' [默认]' : ''}`;
        voiceSelect.appendChild(opt);
      });
      voiceCount.textContent = `共 ${voices.length} 个音色(中文 ${zh.length} / 英文 ${en.length})。中文音色质量取决于系统(Win/Mac/Android 各自不同)。`;
    }
    loadVoices();
    speechSynthesis.onvoiceschanged = loadVoices;

    const rateInput = document.getElementById('rate');
    const rateVal = document.getElementById('rateVal');
    rateInput.oninput = () => rateVal.textContent = rateInput.value + 'x';

    document.getElementById('speak').onclick = () => {
      const text = document.getElementById('ttsText').value;
      if (!text) return;
      const u = new SpeechSynthesisUtterance(text);
      const voices = speechSynthesis.getVoices();
      const v = voices.find(x => x.name === voiceSelect.value);
      if (v) { u.voice = v; u.lang = v.lang; }
      u.rate = parseFloat(rateInput.value);
      speechSynthesis.cancel();
      speechSynthesis.speak(u);
    };
    document.getElementById('stopTts').onclick = () => speechSynthesis.cancel();
  </script>
</body>
</html>
